<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>そにき式 売買損益ゲーム</title>
  <style>
    body { font-family: sans-serif; background:#fff8e7; padding:20px; }
    .card { background:white; border-radius:16px; padding:20px; margin:16px 0; box-shadow:0 3px 10px #ddd; }
    button { font-size:18px; padding:10px 16px; border-radius:10px; border:0; background:#ffb347; }
    .answer { display:none; margin-top:12px; font-weight:bold; color:#d35400; }
  </style>
</head>
<body>
  <h1>そにき式 売買損益ゲーム</h1>
  <p>「仕入れ」「売上」「利益」を順番に考えよう。</p>

  <div id="app"></div>

  <script>
    const stages = [
      ["レベル0-1", "80円で仕入れて120円で売りました。利益はいくら？", "40円", "利益 = 売ったお金 - 仕入れたお金"],
      ["レベル0-2", "100円のものを10個仕入れ、150円で10個全部売りました。利益はいくら？", "500円", "仕入れ1000円、売上1500円"],
      ["レベル1", "80円のりんごを20個仕入れ、120円で20個全部売りました。利益はいくら？", "800円", "仕入れ1600円、売上2400円"],
      ["レベル2", "80円のりんごを20個仕入れ、120円で18個売りました。残りは捨てました。利益はいくら？", "560円", "捨てても20個分の仕入れ代は払っている"],
      ["レベル3", "60円のカードを100枚仕入れ、1枚20円の利益を見こんで定価をつけました。70枚売り、残りは50円で売りました。利益はいくら？", "1100円", "定価80円。売上は80×70 + 50×30"]
    ];

    const app = document.getElementById("app");

    stages.forEach((s, i) => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h2>${s[0]}</h2>
        <p>${s[1]}</p>
        <button onclick="document.getElementById('a${i}').style.display='block'">答えを見る</button>
        <div class="answer" id="a${i}">
          <p>答え：${s[2]}</p>
          <p>${s[3]}</p>
        </div>
      `;
      app.appendChild(div);
    });
  </script>
</body>
</html>
