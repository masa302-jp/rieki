    // Arrow to extra discount
    line(x+w08,y+h+18,x+w08,y+h+48,"tick");
    txt(x+w08+125,y+h+42,has("salePrice") ? "さらに200円引き → 2200円" : "さらに200円引き → ？円","labelRed","start");

    // Lower bar: cost = 1, sale = 1.1
    const y2=180, costW=560, profitW=62;
    rect(x,y2,costW,h,"#E8F5E9","#2E7D32");
    rect(x+costW,y2,profitW,h,"#FFF3E0","#F57C00");

    txt(x+costW/2,y2-18,has("cost") ? "仕入れ値 2000円" : "仕入れ値 ？円","labelRed");
    txt(x+costW/2,y2+28,"1","labelBlack");

    txt(x+costW+profitW/2,y2-18,"利益 0.1","labelBlack");
    txt(x+costW+profitW/2,y2+28,"0.1","labelBlack");

    txt(x+(costW+profitW)/2,y2+h+42,has("ratio") ? "売値 2200円 = 1.1" : "売値 2200円 = ？倍","labelBlue");

    const cue = !has("discounted") ? "STEP1: 3000 × 0.8 = ?"
      : !has("salePrice") ? "STEP2: 2400 − 200 = ?"
      : !has("ratio") ? "STEP3: 1 + 0.1 = ?"
      : !has("cost") ? "STEP4: 2200 ÷ 1.1 = ?"
      : "完成！";
    rect(255,8,390,34,"#FFFFFF","#FF9800");
    txt(450,31,cue,"labelBlack");
    return;
  }

  // Earlier problems: simple helper
  el("rt").textContent = "📏 割合バー図";
  el("note").textContent = "売上と仕入れを比べて利益を出す。";
  txt(450,120,"売上 − 仕入れ = 利益","labelBlue");
}
function renderSteps(){let p=PROBLEMS[idx],st=steps(p),box=el("steps");box.innerHTML="";st.forEach((s,i)=>{let row=document.createElement("div");row.className="step "+(i<stepDone?"done":i===stepDone?"activeStep":"locked");let a=Number.isInteger(s.ans)?fmt(s.ans):String(s.ans);row.innerHTML=`<div class="label">${s.label}</div><div>${s.desc} ＝ ${i<stepDone?`<b>${a}${s.unit} ✅</b>`:"？"}</div>${i===stepDone?`<div style="margin-top:8px"><input id="ans" type="number" inputmode="decimal" placeholder="答え"> <span>${s.unit}</span> <button id="chk">確認</button> <span id="msg" style="font-weight:900;color:#c62828"></span></div>`:""}`;box.appendChild(row)});let r=el("result");if(stepDone>=st.length){r.style.display="block";r.textContent=`完成！答えは ${fmt(answer(p))}円 です。`}else{r.style.display="none";let b=el("chk"),inp=el("ans");if(b&&inp){let check=()=>{let v=Number(String(inp.value).replace(/,/g,""));if(Math.abs(v-st[stepDone].ans)<.001){stepDone++;if(PROBLEMS[idx].type==="listPrice"&&stepDone>=st.length){playing=false;t=T.TAG}else{playing=true}lastTs=null;renderAll()}else el("msg").textContent="もう一度！"};b.onclick=check;inp.onkeydown=e=>{if(e.key==="Enter")check()}}}}
function renderAll(){renderNav();renderStatic();renderFrame();renderSteps();el("play").textContent=playing?"⏸ 止める":"▶️ 再生"}function loop(ts){if(!lastTs)lastTs=ts;let dt=(ts-lastTs)*speed;lastTs=ts;if(playing){let gate=gateTime();t+=dt;if(t>=gate&&stepDone<steps(PROBLEMS[idx]).length){t=gate;playing=false}if(t>=DUR){t=DUR;playing=false}renderFrame();el("play").textContent=playing?"⏸ 止める":"▶️ 再生"}requestAnimationFrame(loop)}el("speed").oninput=e=>{speed=parseFloat(e.target.value);el("speedText").textContent=(speed<=.25?"超ゆっくり":speed<=.5?"ゆっくり":speed===1?"ふつう":"はやい")+" ×"+speed};el("timeline").oninput=e=>{t=Number(e.target.value);renderFrame()};el("play").onclick=()=>{playing=!playing;lastTs=null;renderAll()};el("back").onclick=()=>{t=cl(t-3000,0,DUR);renderFrame()};el("forward").onclick=()=>{t=cl(t+3000,0,DUR);renderFrame()};el("start").onclick=()=>{t=0;playing=false;stepDone=0;renderAll()};el("end").onclick=()=>{t=DUR;playing=false;renderAll()};renderAll();requestAnimationFrame(loop);window.addEventListener("resize",renderFrame);
</script></body></html>
