function calc(p){const cost=p.costPer*p.totalBought,sales=p.sales.reduce((s,x)=>s+x.price*x.count,0),soldCount=p.sales.reduce((s,x)=>s+x.count,0);return{cost,sales,soldCount,profit:sales-cost}} function ans(p){const c=calc(p);if(p.ask==="profit")return c.profit;if(p.ask==="listPrice")return p.costPer+p.targetProfitPer;if(p.ask==="cost")return p.costPer;return c.profit} function phaseOf(time){if(time<T.WALK_TO_END)return"walk_to";if(time<T.BUY_END)return"buy";if(time<T.WALK_HOME_END)return"walk_home";if(time<T.TAG_END)return"tag";if(time<T.SELL_END)return"sell";return"done"} function soldAt(time,p){const c=calc(p);if(time<T.TAG_END)return 0;if(time>=T.SELL_END)return c.soldCount;return Math.floor(c.soldCount*((time-T.TAG_END)/(T.SELL_END-T.TAG_END)))} function revenueAt(u,p){let left=u,m=0;for(const s of p.sales){const n=Math.min(left,s.count);m+=n*s.price;left-=n;if(left<=0)break}return m} function tierFor(u,p){let left=Math.max(1,u),before=0;for(let i=0;i<p.sales.length;i++){const s=p.sales[i];if(left<=s.count)return{sale:s,before};before+=s.count;left-=s.count}return{sale:p.sales[p.sales.length-1],before}}
function renderNav(){const nav=el("problemNav");nav.innerHTML="";PROBLEMS.forEach((p,i)=>{const b=document.createElement("button");b.textContent="問"+(i+1);b.className=i===idx?"active":"";b.onclick=()=>{idx=i;t=0;playing=false;lastTs=null;stepDone=0;renderAll()};nav.appendChild(b)})} function renderStatic(){const p=PROBLEMS[idx];el("emojiTitle").textContent=p.emoji;el("problemTitle").textContent=p.title;el("level").textContent=p.levelLabel+"　問題 "+(idx+1)+"/"+PROBLEMS.length+"　求めるもの："+p.askLabel;el("story").textContent=p.story;el("bundleIcon").textContent=p.emoji}
function renderFrame(){const p=PROBLEMS[idx],c=calc(p),ph=phaseOf(t),W=el("scene").clientWidth||700,shopX=W*.5,marketX=W-105,customerX=95;let keeperX=shopX;if(ph==="walk_to")keeperX=lerp(shopX,marketX,ease(t/T.WALK_TO_END));else if(ph==="buy")keeperX=marketX;else if(ph==="walk_home")keeperX=lerp(marketX,shopX,ease((t-T.BUY_END)/(T.WALK_HOME_END-T.BUY_END)));else if(ph==="sell")keeperX=shopX-70;const keeper=el("keeper");keeper.style.left=(keeperX-23)+"px";keeper.style.transform=(ph==="walk_home"||ph==="sell")?"scaleX(-1)":"scaleX(1)";let bundleX=shopX-102,visible=true;if(ph==="walk_to")visible=false;else if(ph==="buy")bundleX=marketX-115;else if(ph==="walk_home")bundleX=lerp(marketX-115,shopX-102,ease((t-T.BUY_END)/(T.WALK_HOME_END-T.BUY_END)));const bundle=el("bundle");bundle.style.display=visible?"block":"none";bundle.style.left=bundleX+"px";bundle.style.bottom="160px";const sold=soldAt(t,p),revenue=revenueAt(sold,p),tier=tierFor(sold+1,p),price=tier.sale.price;const buyer=el("buyer"),money=el("moneyMove"),flash=el("buyFlash");if(ph==="sell"){const r=(t-T.TAG_END)/(T.SELL_END-T.TAG_END),cyc=(r*6)%1,bx=cyc<.5?lerp(customerX,shopX-60,ease(cyc/.5)):lerp(shopX-60,customerX,ease((cyc-.5)/.5));buyer.style.display="block";buyer.style.left=(bx-22)+"px";buyer.textContent=["👩","👦","🧓","👧","🧑","👩‍🦱"][Math.floor(r*6)%6];money.style.display=cyc>.36&&cyc<.66?"block":"none";money.style.left=(bx+8)+"px";money.style.bottom="205px";flash.style.display=cyc>.42&&cyc<.62?"block":"none";flash.textContent="＋"+(p.ask==="profit"?"？":fmt(price))+"円"}else{buyer.style.display=money.style.display=flash.style.display="none"}
if(ph==="sell")el("bundleCount").textContent=p.sales.length>1?tier.sale.label+" ×"+Math.max(0,tier.sale.count-Math.max(0,Math.min(tier.sale.count,sold-tier.before))):"×"+Math.max(0,c.soldCount-sold);else if(ph==="done")el("bundleCount").textContent="売れ残り ×"+(p.wasted||0);else el("bundleCount").textContent="×"+p.totalBought;const tag=el("tag");if(ph==="buy"||ph==="walk_home"){tag.textContent=p.ask==="cost"?"仕入 ？円":"仕入 "+fmt(p.costPer)+"円";tag.className="tag cost"}else if(ph==="tag"){tag.textContent=p.ask==="listPrice"?"定価 ？円":"売値 "+fmt(p.sales[0].price)+"円";tag.className=p.ask==="listPrice"?"tag unknown":"tag sell"}else{tag.textContent=p.ask==="listPrice"?"売値 ？円":(p.sales.length>1?tier.sale.label+" ":"売値 ")+fmt(price)+"円";tag.className=p.ask==="listPrice"?"tag unknown":"tag sell"}
const pb=el("profitBuild"),expected=p.targetProfitPer??(p.sales[0].price-p.costPer);el("pbCost").textContent=p.ask==="cost"?"？円":fmt(p.costPer)+"円";el("pbProfit").textContent=p.ask==="profit"?"？円":fmt(expected)+"円";el("pbSell").textContent=p.ask==="listPrice"?"？円":fmt(p.sales[0].price)+"円";pb.style.display=ph==="tag"?"block":"none";el("phase").textContent={walk_to:"🛒 お店から市場へ",buy:"📦 仕入れ中",walk_home:"🚶 仕入れ品を運ぶ",tag:"🏷️ 値札を考える",sell:"🤝 お客様に売る",done:"✅ 完了"}[ph];let speech="";if(ph==="walk_to")speech="まず市場へ仕入れに行きます。";if(ph==="buy")speech=p.ask==="cost"?"原価は？です。関係から考えます。":`${p.emoji}を ${fmt(p.costPer)}円で ${p.totalBought}個 仕入れます。`;if(ph==="walk_home")speech="仕入れたものを、そのままお店へ運びます。";if(ph==="tag")speech=p.ask==="listPrice"?"仕入れ値に利益をのせて、定価を考えます。":p.ask==="cost"?"原価を1として考えます。":"値札をつけます。";if(ph==="sell")speech=p.ask==="profit"?"売上は増えます。最後の利益は自分で計算しよう。":"売るたびに売上が増えます。";if(ph==="done")speech=`アニメはここまで。${p.askLabel}は下のステップで出そう。`;el("speech").textContent=speech;el("costPanel").innerHTML=ph==="walk_to"?"📦 仕入れ：まだ":p.ask==="cost"?`📦 仕入れ<br>${p.askLabel}：？円`:`📦 仕入れ<br>${fmt(p.costPer)}円 × ${p.totalBought}個<br>👛 支払い −${fmt(c.cost)}円`;el("salesPanel").innerHTML=`💰 売上<br>${sold} / ${c.soldCount}個 売れた<br>＋${p.ask==="profit"?"？":fmt(revenue)}円`;updateRatio(p,ph);el("sBought").textContent=`仕入れ：${p.ask==="cost"?"？":p.totalBought}個`;el("sSold").textContent=`売れた：${sold}個`;el("sLeft").textContent=`残り：${Math.max(0,p.totalBought-sold)}個`;el("sMoney").textContent=p.ask==="profit"?"利益：？円":`求めるもの：${p.askLabel}`;el("timeline").value=Math.round(t);el("timeText").textContent=`${(t/1000).toFixed(1)}秒 / ${(DURATION/1000).toFixed(1)}秒`}
function svg(tag,a={},text=""){const n=document.createElementNS("http://www.w3.org/2000/svg",tag);Object.entries(a).forEach(([k,v])=>n.setAttribute(k,v));n.textContent=text;return n} function text(s,x,y,tx,cls="labelBlack"){s.appendChild(svg("text",{x,y,class:cls,"text-anchor":"middle"},tx))} function line(s,x1,y1,x2,y2,cls="baseLine"){s.appendChild(svg("line",{x1,y1,x2,y2,class:cls}))} function arc(s,x1,y,x2,h,cls){s.appendChild(svg("path",{d:`M ${x1} ${y} Q ${(x1+x2)/2} ${y-h} ${x2} ${y}`,class:cls}))}
function updateRatio(p,ph){const s=el("ratioSvg");s.innerHTML="";if(p.ask==="cost"&&p.discountRate){el("ratioTitle").textContent="📏 割合バー図：1が2回変わる";el("ratioNote").textContent="上は定価を1、下は仕入れ値を1として考える。";let x0=90,x80=500,x100=620,y1=75;line(s,x0,y1,x100,y1);[x0,x80,x100].forEach(x=>line(s,x,y1-15,x,y1+15,"tick"));arc(s,x0,y1-6,x100,52,"arcBlue");text(s,355,28,"定価 3000円 = 1","labelBlue");arc(s,x0,y1-5,x80,28,"arcBlack");text(s,295,64,"2割引後 2400円 = 0.8");text(s,700,72,"さらに200円引き","labelRed");let y2=175,xA=90,xB=620;line(s,xA,y2,xB,y2);[xA,xB].forEach(x=>line(s,x,y2-15,x,y2+15,"tick"));arc(s,xA,y2-6,xB,42,"arcBlack");text(s,355,152,"売値 2200円 = 仕入れ値の1.1");text(s,xA,y2+35,"仕入れ値 ？ = 1","labelRed");text(s,xB,y2+35,"売値 2200円 = 1.1");return}if(p.ask==="cost"){el("ratioTitle").textContent="📏 割合バー図：原価を1とする";el("ratioNote").textContent="原価を1とすると、利益は0.15、定価3450円は1.15。";let x0=90,x1=610,x2=740,y=125;line(s,x0,y,x2,y);[x0,x1,x2].forEach(x=>line(s,x,y-17,x,y+17,"tick"));arc(s,x0,y-6,x1,70,"arcBlack");text(s,350,62,"原価 ？円 = 1","labelRed");arc(s,x1,y-6,x2,40,"arcBlack");text(s,675,78,"利益 0.15");arc(s,x0,y-8,x2,105,"arcBlue");text(s,415,30,"定価 3450円 = 1.15","labelBlue");return}if(p.ask==="listPrice"||p.targetProfitPer){el("ratioTitle").textContent="📏 割合バー図：原価に利益をのせる";let pr=p.targetProfitPer??(p.sales[0].price-p.costPer);el("ratioNote").textContent=`原価${fmt(p.costPer)}円を1とする。利益は${fmt(pr)}円。`;let x0=90,x1=570,x2=720,y=125;line(s,x0,y,x2,y);[x0,x1,x2].forEach(x=>line(s,x,y-17,x,y+17,"tick"));arc(s,x0,y-6,x1,70,"arcBlack");text(s,330,62,`原価 ${fmt(p.costPer)}円 = 1`);arc(s,x1,y-6,x2,40,"arcBlack");text(s,645,78,`利益 ${fmt(pr)}円`);arc(s,x0,y-8,x2,105,"arcBlue");text(s,405,30,p.ask==="listPrice"?"定価 ？円":`定価 ${fmt(p.sales[0].price)}円`,"labelBlue");return}el("ratioTitle").textContent="📏 割合バー図";el("ratioNote").textContent="この問題では、売上と仕入れを比べて利益を出す。";text(s,450,120,"売上 − 仕入れ = 利益","labelBlue")}
function steps(p){const c=calc(p),a=[];if(p.ask==="profit"){a.push({label:"① 仕入れ総額",desc:`${fmt(p.costPer)}円 × ${p.totalBought}個`,answer:c.cost,unit:"円"});p.sales.forEach((s,i)=>a.push({label:`② 売上${p.sales.length>1?" その"+(i+1)+"（"+s.label+"）":""}`,desc:`${fmt(s.price)}円 × ${s.count}個`,answer:s.price*s.count,unit:"円"}));if(p.sales.length>1)a.push({label:"③ 売上合計",desc:p.sales.map(s=>fmt(s.price*s.count)+"円").join(" ＋ "),answer:c.sales,unit:"円"});a.push({label:"最後 利益",desc:`売上 ${fmt(c.sales)}円 − 仕入れ ${fmt(c.cost)}円`,answer:c.profit,unit:"円"})}else if(p.ask==="listPrice")a.push({label:"① 定価を決める",desc:`仕入れ値 ${fmt(p.costPer)}円 ＋ 見こむ利益 ${fmt(p.targetProfitPer)}円`,answer:p.costPer+p.targetProfitPer,unit:"円"});else if(p.ask==="cost"&&p.markupRate){a.push({label:"① 定価が原価の何倍か",desc:"1 ＋ 0.15",answer:1.15,unit:"倍"});a.push({label:"② 原価を求める",desc:"3450円 ÷ 1.15",answer:p.costPer,unit:"円"})}else if(p.ask==="cost"){let d=p.listPrice*(1-p.discountRate),sale=d-p.extraDiscount;a.push({label:"① 2割引後の値段",desc:`${fmt(p.listPrice)}円 × 0.8`,answer:d,unit:"円"});a.push({label:"② おまけ後の売値",desc:`${fmt(d)}円 − ${fmt(p.extraDiscount)}円`,answer:sale,unit:"円"});a.push({label:"③ 売値は仕入れ値の何倍か",desc:"1 ＋ 0.1",answer:1.1,unit:"倍"});a.push({label:"④ 仕入れ値を求める",desc:`${fmt(sale)}円 ÷ 1.1`,answer:p.costPer,unit:"円"})}return a}
function renderSteps(){const p=PROBLEMS[idx],st=steps(p),box=el("steps");box.innerHTML="";st.forEach((s,i)=>{let row=document.createElement("div");row.className="stepRow "+(i<stepDone?"done":i===stepDone?"active":"locked");let answer=Number.isInteger(s.answer)?fmt(s.answer):String(s.answer);row.innerHTML=`<div class="label">${s.label}</div><div>${s.desc} ＝ ${i<stepDone?`<b>${answer}${s.unit} ✅</b>`:"？"}</div>${i===stepDone?`<div class="stepInput"><input type="number" inputmode="decimal" placeholder="答え" id="stepAns"><span>${s.unit}</span><button id="stepCheck">確認</button><span id="stepMsg" style="font-weight:900;color:#C62828"></span></div>`:""}`;box.appendChild(row)});let res=el("resultBox");if(stepDone>=st.length){res.style.display="block";res.textContent=`完成！${p.askLabel}は ${fmt(ans(p))}円 です。`}else{res.style.display="none";let btn=el("stepCheck"),inp=el("stepAns");if(btn&&inp){let check=()=>{let val=Number(String(inp.value).replace(/,/g,""));if(Math.abs(val-st[stepDone].answer)<.001){stepDone++;renderSteps()}else el("stepMsg").textContent="もう一度！"};btn.onclick=check;inp.onkeydown=e=>{if(e.key==="Enter")check()}}}}
function renderAll(){renderNav();renderStatic();renderFrame();renderSteps();el("play").textContent=playing?"⏸ 止める":"▶️ 再生"}function loop(ts){if(!lastTs)lastTs=ts;let dt=(ts-lastTs)*speed;lastTs=ts;if(playing){t+=dt;if(t>=DURATION){t=DURATION;playing=false}renderFrame();el("play").textContent=playing?"⏸ 止める":"▶️ 再生"}requestAnimationFrame(loop)}el("speed").oninput=e=>{speed=parseFloat(e.target.value);el("speedText").textContent=(speed<=.25?"超ゆっくり":speed<=.5?"ゆっくり":speed===1?"ふつう":"はやい")+" ×"+speed};el("timeline").oninput=e=>{t=Number(e.target.value);renderFrame()};el("play").onclick=()=>{playing=!playing;lastTs=null;renderAll()};el("back").onclick=()=>{t=clamp(t-3000,0,DURATION);renderFrame()};el("forward").onclick=()=>{t=clamp(t+3000,0,DURATION);renderFrame()};el("start").onclick=()=>{t=0;playing=false;renderAll()};el("end").onclick=()=>{t=DURATION;playing=false;renderAll()};renderAll();requestAnimationFrame(loop);window.addEventListener("resize",renderFrame);
