// ===== CALCULATIONS =====
function calcProblem(p) {
  const cost = p.costPer * p.totalBought;
  const tiers = p.sales.map(s => ({...s, sub: s.price * s.count}));
  const rev = tiers.reduce((a, t) => a + t.sub, 0);
  return {cost, tiers, rev, profit: rev - cost};
}

function buildSteps(p, c) {
  const steps = [{id:"cost", label:"📦 仕入れ総額", desc:`${p.costPer.toLocaleString()}円 × ${p.totalBought}個`, answer:c.cost}];
  c.tiers.forEach((t,i) => {
    steps.push({id:`rev${i}`, label:`💰 売上（${t.label}）`, desc:`${t.price.toLocaleString()}円 × ${t.count}個`, answer:t.sub});
  });
  if (c.tiers.length > 1) {
    steps.push({id:"revtotal", label:"💰 売上合計", desc:c.tiers.map(t=>`${t.sub.toLocaleString()}`).join("円 ＋ ")+"円", answer:c.rev});
  }
  steps.push({id:"profit", label:c.profit>=0?"🎯 利益を計算":"🎯 損益を計算", desc:`${c.rev.toLocaleString()}円 ー ${c.cost.toLocaleString()}円`, answer:c.profit, isFinal:true});
  return steps;
}

// ===== ANIMATED SCENE =====
function SceneAnimation({problem, speed, onDone, onReplay}) {
  const [elapsed, setElapsed] = useState(0);
  const [yenKey, setYenKey] = useState(0);
  const [yenPrice, setYenPrice] = useState(0);
  const [isPlaying, setIsPlaying] = useState(true);
  const elapsedRef = useRef(0);
  const lastSold = useRef(0);

  // ── SLOWER TIMING ──
  const T = {
    WALK_TO:   3000,   // 3s  walk to market
    AT_MKT:    5800,   // 2.8s buying at market
    WALK_HOME: 9000,   // 3.2s walk home
    SETUP:     10800,  // 1.8s setup shop
    SELL_END:  18500,  // 7.7s selling
    DONE:      19000
  };

  useEffect(() => {
    if (!isPlaying) return;
    let last = Date.now();
    const id = setInterval(() => {
      const now = Date.now();
      const delta = (now - last) * speed;
      last = now;
      setElapsed(prev => {
        const next = Math.min(prev + delta, T.DONE);
        elapsedRef.current = next;
        if (next >= T.DONE) setIsPlaying(false);
        return next;
      });
    }, 40);
    return () => clearInterval(id);
  }, [isPlaying, speed]);

  const seekTo = (value) => {
    const next = Math.max(0, Math.min(T.DONE, Number(value)));
    elapsedRef.current = next;
    setElapsed(next);
    lastSold.current = 0;
    setYenKey(0);
  };

  const jump = (delta) => {
    seekTo(elapsedRef.current + delta);
  };

  const t = elapsed;

  const phase =
    t < T.WALK_TO   ? "walk_to"
    : t < T.AT_MKT  ? "at_mkt"
    : t < T.WALK_HOME ? "walk_home"
    : t < T.SETUP   ? "setup"
    : t < T.SELL_END ? "selling"
    : "done";

  const easeIO = x => x < 0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;

  // Uncle position
  const SHOP_X = 35, MKT_X = 262;
  let uncleX;
  if (phase === "walk_to") {
    uncleX = SHOP_X + easeIO(Math.min(t/T.WALK_TO,1)) * (MKT_X-SHOP_X);
  } else if (phase === "at_mkt") {
    uncleX = MKT_X;
  } else if (phase === "walk_home") {
    uncleX = MKT_X - easeIO(Math.min((t-T.AT_MKT)/(T.WALK_HOME-T.AT_MKT),1)) * (MKT_X-SHOP_X);
  } else {
    uncleX = SHOP_X;
  }

  const isWalking = phase === "walk_to" || phase === "walk_home";
  const bobY = isWalking ? Math.sin(t/140)*3.5 : 0;
  // Face direction: right when walking to market or selling (toward customers), left otherwise
  const facingRight = phase==="walk_to" || phase==="setup" || phase==="selling" || phase==="done";

  // Items at market: appear one by one
  const maxViz = Math.min(problem.totalBought, 7);
  const mktCount = (phase==="at_mkt" || phase==="walk_home")
    ? Math.min(Math.floor((t-T.WALK_TO)/350), maxViz)
    : 0;

  // Shop display items
  const tier1V = Math.min(problem.sales[0].count, maxViz);
  const tier2V = problem.sales[1] ? Math.min(problem.sales[1].count, maxViz-tier1V) : 0;
  const wasteV = Math.min(problem.wasted||0, maxViz-tier1V-tier2V);
  const vizItems = [
    ...Array(tier1V).fill(0).map(()=>({tier:0})),
    ...Array(tier2V).fill(0).map(()=>({tier:1})),
    ...Array(wasteV).fill(0).map(()=>({tier:"waste"}))
  ];

  // Sell animation
  const sellInterval = (T.SELL_END - T.SETUP) / (vizItems.length || 1);
  const vizSold = phase==="selling"
    ? Math.min(Math.floor((t-T.SETUP)/sellInterval), vizItems.length)
    : phase==="done" ? vizItems.length : 0;

  // Floating yen trigger
  useEffect(() => {
    if (vizSold > lastSold.current) {
      const idx = vizSold-1;
      const item = vizItems[idx];
      if (item && item.tier !== "waste") {
        const price = item.tier===0 ? problem.sales[0].price : problem.sales[1]?.price;
        if (price) { setYenPrice(price); setYenKey(k=>k+1); }
      }
      lastSold.current = vizSold;
    }
  }, [vizSold]);

  // Customers
  const cEmojis = ["👩","👦","🧓","👧","🧑","👩‍🦱"];
  const cCount = phase==="selling"
    ? Math.min(Math.max(0, Math.ceil((t-T.SETUP)/sellInterval) - vizSold + 1), 3)
    : 0;

  // Money animation totals: actual numbers, not just the small visual sample
  const totalCost = problem.costPer * problem.totalBought;
  const totalSoldCount = problem.sales.reduce((sum, s) => sum + s.count, 0);
  const sellProgress = phase==="selling"
    ? Math.min(Math.max((t - T.SETUP) / (T.SELL_END - T.SETUP), 0), 1)
    : phase==="done" ? 1 : 0;
  const actualSoldUnits = Math.min(totalSoldCount, Math.floor(totalSoldCount * sellProgress));

  const revenueForUnits = (units) => {
    let left = units;
    let money = 0;
    for (const s of problem.sales) {
      const n = Math.min(left, s.count);
      money += n * s.price;
      left -= n;
      if (left <= 0) break;
    }
    return money;
  };

  const revenueSoFar = revenueForUnits(actualSoldUnits);
  const totalRevenue = problem.sales.reduce((sum, s) => sum + s.price * s.count, 0);
  const profit = totalRevenue - totalCost;
  const paidCost = phase==="at_mkt" || phase==="walk_home" || phase==="setup" || phase==="selling" || phase==="done";
  const showCostTotal = phase==="at_mkt" || phase==="walk_home" || phase==="setup" || phase==="selling" || phase==="done";
  const showSalesTotal = phase==="selling" || phase==="done";

  // Speech
  let speech = null;
  if (phase==="walk_to" && t>400)          speech = "市場へ行ってきます！";
  if (phase==="at_mkt") {
    const r = (t-T.WALK_TO)/(T.AT_MKT-T.WALK_TO);
    speech = r < 0.35 ? `${problem.emoji}を${problem.costPer.toLocaleString()}円で…`
           : r < 0.65 ? `${problem.totalBought}個なら 仕入れ総額は？`
           : r < 0.85 ? `${problem.costPer.toLocaleString()}円 × ${problem.totalBought}個 = ${totalCost.toLocaleString()}円`
           : `${totalCost.toLocaleString()}円 支払った！`;
  }
  if (phase==="walk_home" && t>T.AT_MKT+800) speech = `${problem.totalBought}個 仕入れた！`;
  if (phase==="setup")                        speech = problem.pricingNote || `${problem.sales[0].price.toLocaleString()}円で売るぞ！`;
  if (phase==="selling" && t<T.SETUP+900)     speech = "売るたびにお金をもらうよ！";

  const phaseLabel = {
    walk_to:"🛒 市場へ…",
    at_mkt:"💰 仕入れ中",
    walk_home:"🏃 帰宅中！",
    setup:"🏷️ 値段つけ中",
    selling:"🤝 販売中！",
    done:"✅ 完了！"
  }[phase];

  const progress = Math.min(t/T.DONE, 1);
  const isDone = phase==="done";
  const timeText = `${(t/1000).toFixed(1)}秒 / ${(T.DONE/1000).toFixed(1)}秒`;

  // Speech bubble left position (clamp within scene)
  const bubbleLeft = Math.max(142, Math.min(uncleX-8, 198));

  return (
    <div>
      {/* ── SCENE ── */}
      <div style={{
        width:"100%", height:270, position:"relative", overflow:"hidden",
        borderRadius:16,
        background:"linear-gradient(to bottom, #64B5F6 0%, #B3E5FC 50%, #AED581 50%, #8BC34A 100%)",
        boxShadow:"0 4px 18px rgba(0,0,0,0.18)",
        border:"2.5px solid rgba(255,255,255,0.7)"
      }}>

        {/* Sky */}
        <div style={{position:"absolute",top:9,left:13,fontSize:"1.5em"}}>☀️</div>
        <div style={{position:"absolute",top:13,left:58,fontSize:"0.95em",opacity:0.7}}>⛅</div>
        <div style={{position:"absolute",top:9,right:60,fontSize:"0.85em",opacity:0.55}}>☁️</div>

        {/* Path */}
        <div style={{
          position:"absolute", bottom:40, left:72, right:72, height:7,
          background:"rgba(121,85,72,0.3)", borderRadius:4
        }}/>

        {/* ── SHOP ── */}
        <div style={{position:"absolute",left:2,bottom:6,width:72,textAlign:"center"}}>
          <div style={{
            background:"#FFF9C4", border:"2px solid #FFB300", borderRadius:7,
            padding:"2px 5px", fontSize:"0.54em", fontWeight:"bold", color:"#E65100",
            marginBottom:2, display:"inline-block", whiteSpace:"nowrap"
          }}>
            売値 {problem.sales[0].price.toLocaleString()}円
          </div>
          <div style={{fontSize:"3em",lineHeight:1.05}}>🏪</div>
          <div style={{fontSize:"0.58em",fontWeight:"bold",color:"#333",background:"rgba(255,255,255,0.65)",borderRadius:4,padding:"0 3px"}}>お店</div>
        </div>

        {/* ── MARKET ── */}
        <div style={{position:"absolute",right:2,bottom:6,width:72,textAlign:"center"}}>
          <div style={{
            background:"#E8F5E9", border:"2px solid #43A047", borderRadius:7,
            padding:"2px 5px", fontSize:"0.54em", fontWeight:"bold", color:"#1B5E20",
            marginBottom:2, display:"inline-block", whiteSpace:"nowrap"
          }}>
            仕入れ {problem.costPer.toLocaleString()}円
          </div>
          <div style={{fontSize:"3em",lineHeight:1.05}}>🏬</div>
          <div style={{fontSize:"0.58em",fontWeight:"bold",color:"#333",background:"rgba(255,255,255,0.65)",borderRadius:4,padding:"0 3px"}}>市場</div>
        </div>

        {/* ── UNCLE ── */}
        <div style={{
          position:"absolute",
          left: uncleX,
          bottom: 42 + bobY,
          fontSize:"2.15em",
          transform:`scaleX(${facingRight?1:-1})`,
          zIndex:10,
          filter:"drop-shadow(1px 1px 1.5px rgba(0,0,0,0.22))",
          userSelect:"none",
          transition:"bottom 0.04s linear"
        }}>
          🧑‍💼
        </div>

        {/* Walk steps */}
        {isWalking && (
          <div style={{
            position:"absolute",
            left: uncleX + (facingRight ? -8 : 28),
            bottom:34,
            fontSize:"0.65em", opacity:0.45
          }}>
            {Math.floor(t/300)%2===0?"👣":"  "}
          </div>
        )}

        {/* ── SPEECH BUBBLE ── */}
        {speech && (
          <div style={{
            position:"absolute",
            left: bubbleLeft,
            bottom:142,
            background:"white", borderRadius:12,
            padding:"4px 10px",
            fontSize:"0.64em", fontWeight:"bold", color:"#222",
            border:"1.5px solid #ddd",
            boxShadow:"0 2px 8px rgba(0,0,0,0.14)",
            zIndex:25, whiteSpace:"normal", maxWidth:160, textAlign:"center"
          }}>
            {speech}
            <div style={{
              position:"absolute", bottom:-7, left:18,
              width:0, height:0,
              borderLeft:"5px solid transparent",
              borderRight:"5px solid transparent",
              borderTop:"7px solid white"
            }}/>
          </div>
        )}

        {/* ── MARKET ITEMS (appear one by one) ── */}
        {mktCount > 0 && (
          <div style={{
            position:"absolute", right:10, bottom:86,
            display:"flex", gap:4, flexWrap:"wrap",
            maxWidth:86, justifyContent:"flex-end"
          }}>
            {Array.from({length:mktCount}).map((_,i) => (
              <div key={i} style={{position:"relative"}}>
                <span style={{fontSize:"1.45em"}}>{problem.emoji}</span>
                <div style={{
                  position:"absolute", top:-9, right:-11,
                  background:"#C62828", color:"white",
                  fontSize:"0.41em", padding:"1px 4px", borderRadius:4,
                  fontWeight:"bold", whiteSpace:"nowrap",
                  boxShadow:"0 1px 3px rgba(0,0,0,0.3)"
                }}>{problem.costPer.toLocaleString()}円</div>
              </div>
            ))}
          </div>
        )}

        {/* ── MONEY: COST TOTAL / PAYMENT ── */}
        {showCostTotal && (
          <div style={{
            position:"absolute", left:8, top:36, width:128,
            background: paidCost ? "#FFEBEE" : "#FFFDE7",
            border: paidCost ? "2px solid #E53935" : "2px solid #FDD835",
            borderRadius:10, padding:"5px 7px",
            fontSize:"0.52em", fontWeight:"bold",
            color: paidCost ? "#B71C1C" : "#F57F17",
            boxShadow:"0 2px 8px rgba(0,0,0,0.14)",
            zIndex:28, lineHeight:1.35
          }}>
            <div>📦 仕入れ総額</div>
            <div>{problem.costPer.toLocaleString()}円 × {problem.totalBought}個</div>
            <div style={{fontSize:"1.15em"}}>{totalCost.toLocaleString()}円</div>
            {paidCost && <div style={{color:"#D32F2F"}}>👛 支払い −{totalCost.toLocaleString()}円</div>}
          </div>
        )}

        {/* ── MONEY: SALES COUNTER ── */}
        {showSalesTotal && (
          <div style={{
            position:"absolute", right:8, top:36, width:128,
            background:"#E8F5E9",
            border:"2px solid #43A047",
            borderRadius:10, padding:"5px 7px",
            fontSize:"0.52em", fontWeight:"bold",
            color:"#1B5E20",
            boxShadow:"0 2px 8px rgba(0,0,0,0.14)",
            zIndex:28, lineHeight:1.35
          }}>
            <div>💰 売上カウンター</div>
            <div>{actualSoldUnits} / {totalSoldCount}個 売れた</div>
            <div style={{fontSize:"1.2em"}}>＋{revenueSoFar.toLocaleString()}円</div>
            {phase==="done" && <div>売上合計 {totalRevenue.toLocaleString()}円</div>}

function ItemGrid({p}) {
  const items = [];
  p.sales.forEach(s => { for(let i=0;i<s.count;i++) items.push({type:"sold",color:s.color}); });
  for(let i=0;i<(p.wasted||0);i++) items.push({type:"waste"});
  const n = items.length;
  const sz = n>60?15:n>30?19:25;
  const gap = n>60?2:3;
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap,padding:7,background:"rgba(255,255,255,0.5)",borderRadius:9}}>
        {items.map((it,i)=>(
          <div key={i} style={{
            width:sz,height:sz,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:sz*0.58,
            background:it.type==="waste"?"#f0f0f0":it.color+"18",
            border:`1.5px solid ${it.type==="waste"?"#bbb":it.color}`,
            borderRadius:4, opacity:it.type==="waste"?0.45:1
          }}>{it.type==="waste"?"✕":p.emoji}</div>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:5}}>
        {p.sales.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:"0.73em"}}>
            <div style={{width:9,height:9,background:s.color,borderRadius:2}}/>
            <span style={{color:"#555"}}>{s.label}：{s.count}個 @{s.price.toLocaleString()}円</span>
          </div>
        ))}
        {(p.wasted||0)>0 && (
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:"0.73em"}}>

          </div>
        )}

    </div>
  );
}

// ===== STEP ROW =====
function StepRow({step, status, onCorrect, rk}) {
  const [val, setVal] = useState("");
  const [error, setError] = useState(false);
  const [errCount, setErrCount] = useState(0);

  const check = () => {
    const n = parseInt(val.replace(/[,，]/g,""), 10);
    if(!isNaN(n) && n===step.answer) { setError(false); onCorrect(); }
    else { setError(true); setErrCount(c=>c+1); }
  };

  const showHint = errCount >= 2;
  const bg   = status==="done"?"#F1F8E9":status==="active"?"#FFFDE7":"#FAFAFA";
  const bdr  = status==="done"?"#66BB6A":status==="active"?"#FFD54F":"#E0E0E0";

  return (
    <div style={{
      background:bg, border:`2px solid ${bdr}`, borderRadius:10,
      padding:"10px 13px", opacity:status==="locked"?0.48:1, transition:"all 0.3s"
    }}>
      <div style={{fontWeight:"bold",fontSize:"0.88em",color:"#333",marginBottom:3}}>{step.label}</div>
      <div style={{fontSize:"0.83em",color:"#666"}}>
        {step.desc} ＝{" "}
        {status==="done"
          ? <strong style={{color:"#2E7D32",fontSize:"1.05em"}}>{step.answer.toLocaleString()}円 ✅</strong>
          : <span style={{color:"#ccc"}}>？</span>
        }
      </div>
      {status==="active" && (
        <div style={{marginTop:9}}>
          {showHint && (
            <div style={{
              fontSize:"0.78em",color:"#E65100",marginBottom:7,
              padding:"5px 9px",background:"#FFF3E0",borderRadius:6,
              border:"1px solid #FFCC80"
            }}>
              💡 ヒント：{step.desc} ＝ <strong>{step.answer.toLocaleString()}円</strong>
            </div>
          )}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input
              key={rk}
              type="number"
              value={val}
              onChange={e=>{setVal(e.target.value);setError(false);}}
              onKeyDown={e=>e.key==="Enter"&&check()}
              placeholder="答えを入力"
              style={{
                width:110,padding:"7px 10px",
                border:`2px solid ${error?"#EF5350":"#ddd"}`,
                borderRadius:8,fontSize:"0.95em",outline:"none",fontFamily:"inherit"
              }}
            />
            <span style={{color:"#555",fontSize:"0.9em"}}>円</span>
            <button onClick={check} style={{
              padding:"7px 15px",
              background:"linear-gradient(135deg,#F57C00,#FF8F00)",
              color:"white",border:"none",borderRadius:8,
              cursor:"pointer",fontWeight:"bold",fontSize:"0.88em",fontFamily:"inherit",
              boxShadow:"0 2px 4px rgba(245,124,0,0.4)"
            }}>確認</button>
          </div>
          {error && <div style={{color:"#EF5350",fontSize:"0.8em",marginTop:5}}>
            {showHint?"上のヒントを見てもう一度！":"❌ ちがいます。もう一度考えてみよう！"}
          </div>}
        </div>
      )}
    </div>
  );
}

        />
      )}

      {/* ── CALCULATION VIEW ── */}
      {view==="calc" && (
        <div>
          <div style={{
            background:"white",borderRadius:14,padding:"10px 12px",
            marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.08)"
          }}>
            <ItemGrid p={p}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:"0.84em",fontWeight:"bold",color:"#666",paddingLeft:2}}>
              📝 順番に計算してみよう！
            </div>
            {steps.map((step,i)=>(
              <StepRow
                key={`${problemKey}-${i}`}
                rk={`${problemKey}-${i}`}
                step={step}
                status={i<doneCount?"done":i===doneCount?"active":"locked"}
                onCorrect={()=>setDoneCount(d=>d+1)}
              />
            ))}
            {solved && (
              <ResultCard
                c={c} p={p}
                onReset={goReset}
                onNext={goNext}
                isLast={isLast}
              />
            )}
          </div>
        </div>
      )}

      <style>{`
        @keyframes popIn {
          0%   { opacity:0; transform:scale(0.9); }
          100% { opacity:1; transform:scale(1); }
        }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
        input[type=number] { -moz-appearance:textfield; }
        button:active { transform:scale(0.97); }
      `}</style>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<SonekiGame />);
  </script>
</body>
</html>
