// ===== CALCULATIONS =====
function calcProblem(p) {
  const cost = p.costPer * p.totalBought;
  const tiers = p.sales.map(s => ({...s, sub: s.price * s.count}));
  const rev = tiers.reduce((a, t) => a + t.sub, 0);
  return {cost, tiers, rev, profit: rev - cost};
}

function buildSteps(p, c) {
  const steps = [{id:"cost", label:"📦 仕入れ総額", desc:`${p.costPer.toLocaleString()}円 × ${p.totalBought}個`, answer:c.cost}];
  c.tiers.forEach((t,i) => {
    steps.push({id:`rev${i}`, label:`💰 売上（${t.label}）`, desc:`${t.price.toLocaleString()}円 × ${t.count}個`, answer:t.sub});
  });
  if (c.tiers.length > 1) {
    steps.push({id:"revtotal", label:"💰 売上合計", desc:c.tiers.map(t=>`${t.sub.toLocaleString()}`).join("円 ＋ ")+"円", answer:c.rev});
  }
  steps.push({id:"profit", label:c.profit>=0?"🎯 利益を計算":"🎯 損益を計算", desc:`${c.rev.toLocaleString()}円 ー ${c.cost.toLocaleString()}円`, answer:c.profit, isFinal:true});
  return steps;
}

// ===== ANIMATED SCENE =====
function SceneAnimation({problem, speed, onDone, onReplay}) {
  const [elapsed, setElapsed] = useState(0);
  const [yenKey, setYenKey] = useState(0);
  const [yenPrice, setYenPrice] = useState(0);
  const [isPlaying, setIsPlaying] = useState(true);
  const elapsedRef = useRef(0);
  const lastSold = useRef(0);

  // ── SLOWER TIMING ──
  const T = {
    WALK_TO:   4500,
    AT_MKT:    9000,
    WALK_HOME: 14500,
    SETUP:     18000,
    SELL_END:  32000,
    DONE:      42000
  };

  useEffect(() => {
    if (!isPlaying) return;
    let last = Date.now();
    const id = setInterval(() => {
      const now = Date.now();
      const delta = (now - last) * speed;
      last = now;
      setElapsed(prev => {
        const next = Math.min(prev + delta, T.DONE);
        elapsedRef.current = next;
        if (next >= T.DONE) { setIsPlaying(false); return T.DONE; }
        return next;
      });
    }, 40);
    return () => clearInterval(id);
  }, [isPlaying, speed]);

  const seekTo = (value) => {
    const next = Math.max(0, Math.min(T.DONE, Number(value)));
    elapsedRef.current = next;
    setElapsed(next);
    lastSold.current = 0;
    setYenKey(0);
  };

  const jump = (delta) => {
    seekTo(elapsedRef.current + delta);
  };

  const t = elapsed;

  const phase =
    t < T.WALK_TO   ? "walk_to"
    : t < T.AT_MKT  ? "at_mkt"
    : t < T.WALK_HOME ? "walk_home"
    : t < T.SETUP   ? "setup"
    : t < T.SELL_END ? "selling"
    : "done";

  const easeIO = x => x < 0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2;

  // Bundle display helpers: the displayed groups always add up to the real problem numbers.
  const makeBundles = (count, maxBundles=6) => {
    if (count <= 0) return [];
    const size = Math.ceil(count / maxBundles);
    const bundles = [];
    let left = count;
    while (left > 0) {
      const n = Math.min(size, left);
      bundles.push(n);
      left -= n;
    }
    return bundles;
  };

  const totalSalesCount = problem.sales.reduce((sum, s) => sum + s.count, 0);
  const boughtBundles = makeBundles(problem.totalBought, 6);
  const soldBundles = problem.sales.flatMap((s, tier) =>
    makeBundles(s.count, 4).map(n => ({
      n, tier, price:s.price, label:s.label, color:s.color, type:"sold"
    }))
  );
  const wasteBundles = makeBundles(problem.wasted || 0, 2).map(n => ({
    n, tier:"waste", price:null, label:"売れ残り", color:"#9E9E9E", type:"waste"
  }));
  const displayBundles = [...soldBundles, ...wasteBundles];

  // Uncle position
  const SHOP_X = 465, MKT_X = 815;
  let uncleX;
  if (phase === "walk_to") {
    uncleX = SHOP_X + easeIO(Math.min(t/T.WALK_TO,1)) * (MKT_X-SHOP_X);
  } else if (phase === "at_mkt") {
    uncleX = MKT_X;
  } else if (phase === "walk_home") {
    uncleX = MKT_X - easeIO(Math.min((t-T.AT_MKT)/(T.WALK_HOME-T.AT_MKT),1)) * (MKT_X-SHOP_X);
  } else {
    uncleX = SHOP_X;
  }

  const isWalking = phase === "walk_to" || phase === "walk_home";
  const bobY = isWalking ? Math.sin(t/140)*3.5 : 0;

  // Bundles physically move with the shopkeeper from market to shop.
  const cartProgress = phase==="walk_home"
    ? easeIO(Math.min(Math.max((t-T.AT_MKT)/(T.WALK_HOME-T.AT_MKT),0),1))
    : phase==="setup" || phase==="selling" || phase==="done" ? 1 : 0;
  const bundleX = phase==="walk_home"
    ? MKT_X - cartProgress * (MKT_X-SHOP_X)
    : phase==="at_mkt" ? MKT_X
    : SHOP_X;

  // Face direction: right when walking to market or selling (toward customers), left otherwise
  const facingRight = phase==="walk_to" || phase==="setup" || phase==="selling" || phase==="done";

  // Market bundles appear one by one. The total shown matches the bought count.
  const mktCount = (phase==="at_mkt" || phase==="walk_home" || phase==="setup")
    ? (phase==="setup"
        ? boughtBundles.length
        : Math.min(Math.floor((t-T.WALK_TO)/360), boughtBundles.length))
    : 0;

  // Selling uses the real sold count, not the number of icons.
  const sellProgressForBundles = phase==="selling"
    ? Math.min(Math.max((t - T.SETUP) / (T.SELL_END - T.SETUP), 0), 1)
    : phase==="done" ? 1 : 0;
  const unitsSoldAnimated = Math.min(totalSalesCount, Math.floor(totalSalesCount * sellProgressForBundles));

  const soldUnitsBeforeBundle = (bundleIndex) => {
    let sum = 0;
    for (let i=0; i<bundleIndex; i++) {
      if (displayBundles[i]?.type === "sold") sum += displayBundles[i].n;
    }
    return sum;
  };

  const bundleSoldState = (bundleIndex, bundle) => {
    if (bundle.type === "waste") return false;
    const before = soldUnitsBeforeBundle(bundleIndex);
    return unitsSoldAnimated >= before + bundle.n;
  };

  const activeSoldBundleIndex = displayBundles.findIndex((b, i) => {
    if (b.type !== "sold") return false;
    const before = soldUnitsBeforeBundle(i);
    return unitsSoldAnimated > before && unitsSoldAnimated < before + b.n;
  });

  // Floating yen trigger: fires when the real sold unit count increases.
  useEffect(() => {
    if (unitsSoldAnimated > lastSold.current) {
      let remaining = unitsSoldAnimated;
      let price = problem.sales[0].price;
      for (const s of problem.sales) {
        if (remaining <= s.count) { price = s.price; break; }
        remaining -= s.count;
      }
      setYenPrice(price);
      setYenKey(k=>k+1);
      lastSold.current = unitsSoldAnimated;
    }
  }, [unitsSoldAnimated]);

  // Customers
  const cEmojis = ["👩","👦","🧓","👧","🧑","👩‍🦱"];
  const cCount = phase==="selling" ? 3 : 0;

  // Money animation totals: actual numbers, not just the small visual sample
  const totalCost = problem.costPer * problem.totalBought;
  const sellProgress = phase==="selling"
    ? Math.min(Math.max((t - T.SETUP) / (T.SELL_END - T.SETUP), 0), 1)
    : phase==="done" ? 1 : 0;
  const actualSoldUnits = unitsSoldAnimated;

  const revenueForUnits = (units) => {
    let left = units;
    let money = 0;
    for (const s of problem.sales) {
      const n = Math.min(left, s.count);
      money += n * s.price;
      left -= n;
      if (left <= 0) break;
    }
    return money;
  };

  const revenueSoFar = revenueForUnits(actualSoldUnits);
  const totalRevenue = problem.sales.reduce((sum, s) => sum + s.price * s.count, 0);
  const profit = totalRevenue - totalCost;
  const paidCost = phase==="at_mkt" || phase==="walk_home" || phase==="setup" || phase==="selling" || phase==="done";
  const showCostTotal = phase==="at_mkt" || phase==="walk_home" || phase==="setup" || phase==="selling" || phase==="done";
  const showSalesTotal = phase==="selling" || phase==="done";

  // Speech
  let speech = null;
  if (phase==="walk_to" && t>400)          speech = "市場へ行ってきます！";
  if (phase==="at_mkt") {
    const r = (t-T.WALK_TO)/(T.AT_MKT-T.WALK_TO);
    speech = r < 0.35 ? `${problem.emoji}を${problem.costPer.toLocaleString()}円で…`
           : r < 0.65 ? `${problem.totalBought}個なら 仕入れ総額は？`
           : r < 0.85 ? `${problem.costPer.toLocaleString()}円 × ${problem.totalBought}個 = ${totalCost.toLocaleString()}円`
           : `${totalCost.toLocaleString()}円 支払った！`;
  }
  if (phase==="walk_home" && t>T.AT_MKT+800) speech = `${problem.totalBought}個 仕入れた！`;
  if (phase==="setup")                        speech = `値札を仕入れ値から売値 ${problem.sales[0].price.toLocaleString()}円 に変えるよ！`;
  if (phase==="selling" && t<T.SETUP+900)     speech = "売るたびに売上が増えるよ！";

  const phaseLabel = {
    walk_to:"🛒 市場へ…",
    at_mkt:"💰 仕入れ中",
    walk_home:"🏃 帰宅中！",
    setup:"🏷️ 値段つけ中",
    selling:"🤝 販売中！",
    done:"✅ 完了！"
  }[phase];

  const progress = Math.min(t/T.DONE, 1);
  const isDone = phase==="done";
  const timeText = `${(t/1000).toFixed(1)}秒 / ${(T.DONE/1000).toFixed(1)}秒`;

  // Speech bubble left position (clamp within scene)
  const bubbleLeft = Math.max(300, Math.min(uncleX-40, 620));

  return (
    <div>
      {/* ── SCENE ── */}
      <div style={{
        width:"100%", height:520, position:"relative", overflow:"hidden",
        borderRadius:16,
        background:"linear-gradient(to bottom, #64B5F6 0%, #B3E5FC 50%, #AED581 50%, #8BC34A 100%)",
        boxShadow:"0 4px 18px rgba(0,0,0,0.18)",
        border:"2.5px solid rgba(255,255,255,0.7)"
      }}>

        {/* Sky */}
        <div style={{position:"absolute",top:9,left:13,fontSize:"2em"}}>☀️</div>
        <div style={{position:"absolute",top:13,left:58,fontSize:"0.95em",opacity:0.7}}>⛅</div>
        <div style={{position:"absolute",top:9,right:60,fontSize:"0.85em",opacity:0.55}}>☁️</div>

        {/* Path */}
        <div style={{
          position:"absolute", bottom:82, left:"50%", right:92, height:9,
          background:"rgba(121,85,72,0.3)", borderRadius:4
        }}/>

        {/* ── SHOP ── */}
        <div style={{position:"absolute",left:"50%",transform:"translateX(-50%)",bottom:18,width:112,textAlign:"center"}}>
          <div style={{
            background:"#FFF9C4", border:"2px solid #FFB300", borderRadius:7,
            padding:"2px 5px", fontSize:"0.54em", fontWeight:"bold", color:"#E65100",
            marginBottom:2, display:"inline-block", whiteSpace:"nowrap"
          }}>
            売値 {problem.sales[0].price.toLocaleString()}円
          </div>
          <div style={{fontSize:"4.4em",lineHeight:1.05}}>🏪</div>
          <div style={{fontSize:"0.58em",fontWeight:"bold",color:"#333",background:"rgba(255,255,255,0.65)",borderRadius:4,padding:"0 3px"}}>お店</div>
        </div>

        {/* ── MARKET ── */}
        <div style={{position:"absolute",right:2,bottom:18,width:112,textAlign:"center"}}>
          <div style={{
            background:"#E8F5E9", border:"2px solid #43A047", borderRadius:7,
            padding:"2px 5px", fontSize:"0.54em", fontWeight:"bold", color:"#1B5E20",
            marginBottom:2, display:"inline-block", whiteSpace:"nowrap"
          }}>
            仕入れ {problem.costPer.toLocaleString()}円
          </div>
          <div style={{fontSize:"4.4em",lineHeight:1.05}}>🏬</div>
          <div style={{fontSize:"0.58em",fontWeight:"bold",color:"#333",background:"rgba(255,255,255,0.65)",borderRadius:4,padding:"0 3px"}}>市場</div>
        </div>

        {/* ── UNCLE ── */}
        <div style={{
          position:"absolute",
          left: uncleX,
          bottom: 78 + bobY,
          fontSize:"3em",
          transform:`scaleX(${facingRight?1:-1})`,
          zIndex:10,
          filter:"drop-shadow(1px 1px 1.5px rgba(0,0,0,0.22))",
          userSelect:"none",
          transition:"bottom 0.04s linear"
        }}>
          🧑‍💼
        </div>

        {/* Walk steps */}
        {isWalking && (
          <div style={{
            position:"absolute",
            left: uncleX + (facingRight ? -8 : 28),
            bottom:54,
            fontSize:"0.65em", opacity:0.45
          }}>
            {Math.floor(t/300)%2===0?"👣":"  "}
          </div>
        )}

        {/* ── SPEECH BUBBLE ── */}
        {speech && (
          <div style={{
            position:"absolute",
            left: bubbleLeft,
            bottom:305,
            background:"rgba(255,255,255,0.96)", borderRadius:14,
            padding:"4px 10px",
            fontSize:"0.64em", fontWeight:"bold", color:"#222",
            border:"1.5px solid #ddd",
            boxShadow:"0 2px 8px rgba(0,0,0,0.14)",
            zIndex:25, whiteSpace:"normal", maxWidth:260, textAlign:"center", fontSize:"0.78em"
          }}>
            {speech}
            <div style={{
              position:"absolute", bottom:-7, left:18,
              width:0, height:0,
              borderLeft:"5px solid transparent",
              borderRight:"5px solid transparent",
              borderTop:"7px solid white"
            }}/>
          </div>
        )}

        {/* ── BUNDLES: appear at market, then move with the shopkeeper to the shop ── */}
        {(phase==="at_mkt" || phase==="walk_home") && mktCount > 0 && (
          <div style={{
            position:"absolute",
            left: phase==="walk_home" ? bundleX - 110 : MKT_X - 130,
            bottom: phase==="walk_home" ? 150 : 150,
            display:"flex", gap:8, flexWrap:"wrap",
            maxWidth:230, justifyContent:"center",
            background:"rgba(255,255,255,0.78)",
            borderRadius:14, padding:10,
            border:"2px solid #43A047",
            boxShadow:"0 3px 12px rgba(0,0,0,0.16)",
            zIndex:18,
            transition:"none"
          }}>
            {boughtBundles.slice(0, mktCount).map((n,i) => (
              <div key={i} style={{
                display:"flex", alignItems:"center", gap:5,
                background:"white", border:"2px solid #43A047",
                borderRadius:10, padding:"5px 8px",
                boxShadow:"0 1px 5px rgba(0,0,0,0.16)",
                fontWeight:"900", color:"#1B5E20"

function ItemGrid({p}) {
  const items = [];
  p.sales.forEach(s => { for(let i=0;i<s.count;i++) items.push({type:"sold",color:s.color}); });
  for(let i=0;i<(p.wasted||0);i++) items.push({type:"waste"});
  const n = items.length;
  const sz = n>60?15:n>30?19:25;
  const gap = n>60?2:3;
  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap,padding:7,background:"rgba(255,255,255,0.5)",borderRadius:9}}>
        {items.map((it,i)=>(
          <div key={i} style={{
            width:sz,height:sz,display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:sz*0.58,
            background:it.type==="waste"?"#f0f0f0":it.color+"18",
            border:`1.5px solid ${it.type==="waste"?"#bbb":it.color}`,
            borderRadius:4, opacity:it.type==="waste"?0.45:1
          }}>{it.type==="waste"?"✕":p.emoji}</div>
        ))}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:5}}>
        {p.sales.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4,fontSize:"0.73em"}}>
            <div style={{width:9,height:9,background:s.color,borderRadius:2}}/>
            <span style={{color:"#555"}}>{s.label}：{s.count}個 @{s.price.toLocaleString()}円</span>
          </div>
        ))}
        {(p.wasted||0)>0 && (
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:"0.73em"}}>

          </div>
        )}

    </div>
  );
}

// ===== STEP ROW =====
function StepRow({step, status, onCorrect, rk}) {
  const [val, setVal] = useState("");
  const [error, setError] = useState(false);
  const [errCount, setErrCount] = useState(0);

  const check = () => {
    const n = parseInt(val.replace(/[,，]/g,""), 10);
    if(!isNaN(n) && n===step.answer) { setError(false); onCorrect(); }
    else { setError(true); setErrCount(c=>c+1); }
  };

  const showHint = errCount >= 2;
  const bg   = status==="done"?"#F1F8E9":status==="active"?"#FFFDE7":"#FAFAFA";
  const bdr  = status==="done"?"#66BB6A":status==="active"?"#FFD54F":"#E0E0E0";

  return (
    <div style={{
      background:bg, border:`2px solid ${bdr}`, borderRadius:10,
      padding:"10px 13px", opacity:status==="locked"?0.48:1, transition:"all 0.3s"
    }}>
      <div style={{fontWeight:"bold",fontSize:"0.88em",color:"#333",marginBottom:3}}>{step.label}</div>
      <div style={{fontSize:"0.83em",color:"#666"}}>
        {step.desc} ＝{" "}
        {status==="done"
          ? <strong style={{color:"#2E7D32",fontSize:"1.05em"}}>{step.answer.toLocaleString()}円 ✅</strong>
          : <span style={{color:"#ccc"}}>？</span>
        }
      </div>
      {status==="active" && (
        <div style={{marginTop:9}}>
          {showHint && (
            <div style={{
              fontSize:"0.78em",color:"#E65100",marginBottom:7,
              padding:"5px 9px",background:"#FFF3E0",borderRadius:6,
              border:"1px solid #FFCC80"
            }}>
              💡 ヒント：{step.desc} ＝ <strong>{step.answer.toLocaleString()}円</strong>
            </div>
          )}
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input
              key={rk}
              type="number"
              value={val}
              onChange={e=>{setVal(e.target.value);setError(false);}}
              onKeyDown={e=>e.key==="Enter"&&check()}
              placeholder="答えを入力"
              style={{
                width:110,padding:"7px 10px",
                border:`2px solid ${error?"#EF5350":"#ddd"}`,
                borderRadius:8,fontSize:"0.95em",outline:"none",fontFamily:"inherit"
              }}
            />
            <span style={{color:"#555",fontSize:"0.9em"}}>円</span>
            <button onClick={check} style={{
              padding:"7px 15px",
              background:"linear-gradient(135deg,#F57C00,#FF8F00)",
              color:"white",border:"none",borderRadius:8,
              cursor:"pointer",fontWeight:"bold",fontSize:"0.88em",fontFamily:"inherit",
              boxShadow:"0 2px 4px rgba(245,124,0,0.4)"
            }}>確認</button>
          </div>
          {error && <div style={{color:"#EF5350",fontSize:"0.8em",marginTop:5}}>
            {showHint?"上のヒントを見てもう一度！":"❌ ちがいます。もう一度考えてみよう！"}
          </div>}
        </div>
      )}
    </div>
  );
}

function SonekiGame() {
  const [probIdx, setProbIdx]   = useState(0);
  const [view, setView]         = useState("anim");
  const [doneCount, setDoneCount] = useState(0);
  const [problemKey, setProblemKey] = useState(0);
  const [animKey, setAnimKey]   = useState(0);
  const [speed, setSpeed]       = useState(0.5);

  const p  = PROBLEMS[probIdx];
  const c  = calcProblem(p);
  const steps = buildSteps(p, c);
  const solved = doneCount >= steps.length;
  const isLast = probIdx === PROBLEMS.length - 1;

  const replayAnim = () => setAnimKey(k=>k+1);
  const goCalc     = () => setView("calc");

  const goNext = () => {
    const next = (probIdx+1) % PROBLEMS.length;
    setProbIdx(next);
    setView("anim");
    setDoneCount(0);
    setProblemKey(k=>k+1);
    setAnimKey(k=>k+1);
  };
  const jumpToProblem = (idx) => {
    setProbIdx(idx);
    setView("anim");
    setDoneCount(0);
    setProblemKey(k=>k+1);
    setAnimKey(k=>k+1);
  };
  const goReset = () => {
    setView("anim");
    setDoneCount(0);
    setProblemKey(k=>k+1);
    setAnimKey(k=>k+1);
  };

  return (
    <div style={{
      minHeight:"100vh",
      background:"linear-gradient(160deg,#FFF8E1 0%,#FFECB3 60%,#FFE082 100%)",
      fontFamily:"'Hiragino Kaku Gothic Pro','Noto Sans JP','Yu Gothic',sans-serif",
      padding:"20px 24px",
      maxWidth:980, margin:"0 auto"
    }}>

      {/* ── HEADER ── */}
      <div style={{textAlign:"center",marginBottom:13}}>
        <h1 style={{margin:0,fontSize:"1.4em",color:"#BF360C",letterSpacing:"0.04em"}}>
          🏪 損益算トレーナー
        </h1>
        {/* Problem selector */}
        <div style={{
          display:"flex", justifyContent:"center", gap:7, marginTop:10, flexWrap:"wrap",
          background:"rgba(255,255,255,0.5)", borderRadius:14, padding:"8px 10px"
        }}>
          {PROBLEMS.map((pr,i) => {
            const lv = pr.levelNum;
            const col = lv===1?"#4CAF50":lv===2?"#1976D2":"#C62828";
            const active = i===probIdx;
            return (
              <button
                key={i}
                onClick={() => jumpToProblem(i)}
                title={pr.title}
                style={{
                  minWidth:46, height:36, borderRadius:10,
                  background: active ? col : "white",
                  border: active ? `3px solid ${col}` : `2px solid ${col}55`,
                  color: active ? "white" : col,
                  boxShadow: active ? `0 0 0 3px ${col}33` : "0 1px 4px rgba(0,0,0,0.08)",
                  cursor:"pointer", fontWeight:"900", fontSize:"0.82em",
                  fontFamily:"inherit"
                }}
              >
                問{i+1}
              </button>
            );
          })}
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:12,marginTop:6,fontSize:"0.72em",color:"#777",fontWeight:"bold"}}>
          <span>🟢 レベル1</span><span>🔵 レベル2</span><span>🔴 レベル3</span>
          <span style={{color:"#555"}}>現在：問題 {probIdx+1}/{PROBLEMS.length}</span>
        </div>

        <div style={{
          margin:"10px auto 0", maxWidth:340,
          background:"rgba(255,255,255,0.78)",
          border:"1px solid rgba(0,0,0,0.08)",
          borderRadius:12, padding:"8px 11px",
          boxShadow:"0 1px 8px rgba(0,0,0,0.06)"
        }}>
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"space-between",
            fontSize:"0.72em", color:"#6D4C41", fontWeight:"bold", marginBottom:5
          }}>
            <span>🎬 アニメ速度</span>
            <span>{speed === 0.5 ? "ゆっくり" : speed === 1 ? "ふつう" : speed === 1.5 ? "はやい" : "超はやい"} ×{speed}</span>
          </div>
          <input
            type="range"
            min="0.5"
            max="2"
            step="0.5"
            value={speed}
            onChange={e => {
              setSpeed(parseFloat(e.target.value));
              setAnimKey(k => k + 1);
            }}
            style={{width:"100%", accentColor:"#FF8F00"}}
          />
        </div>
      </div>

      {/* ── PROBLEM CARD ── */}
      <div style={{
        background:"white",borderRadius:14,padding:"12px 14px",
        marginBottom:12,boxShadow:"0 2px 12px rgba(0,0,0,0.09)"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <span style={{fontSize:"2.2em"}}>{p.emoji}</span>
          <div>
            <div style={{fontWeight:"bold",fontSize:"1.05em",color:"#333"}}>{p.title}</div>
            <div style={{fontSize:"0.71em",color:"#999",marginTop:1}}>{p.levelLabel}</div>
          </div>
          <div style={{marginLeft:"auto",display:"flex",gap:6}}>
            <button onClick={()=>setView("anim")} style={{
              padding:"5px 10px",borderRadius:8,
              border:`2px solid ${view==="anim"?"#FF8F00":"#ddd"}`,
              background:view==="anim"?"#FFF8E1":"white",
              color:view==="anim"?"#E65100":"#bbb",
              cursor:"pointer",fontSize:"0.7em",fontWeight:"bold",fontFamily:"inherit"
            }}>🎬 アニメ</button>
            <button onClick={()=>setView("calc")} style={{
              padding:"5px 10px",borderRadius:8,
              border:`2px solid ${view==="calc"?"#1565C0":"#ddd"}`,
              background:view==="calc"?"#E3F2FD":"white",
              color:view==="calc"?"#1565C0":"#bbb",
              cursor:"pointer",fontSize:"0.7em",fontWeight:"bold",fontFamily:"inherit"
            }}>📝 計算</button>
          </div>
        </div>
        <div style={{
          background:"#FFFDE7",borderRadius:9,padding:"9px 12px",
          fontSize:"0.88em",lineHeight:1.85,color:"#333",border:"1px solid #FFE082"
        }}>{p.story}</div>
        {p.pricingNote && (
          <div style={{
            background:"#E3F2FD",borderRadius:8,padding:"6px 10px",
            fontSize:"0.81em",color:"#0D47A1",marginTop:8,border:"1px solid #90CAF9"
          }}>📌 {p.pricingNote}</div>
        )}
      </div>

      {/* ── ANIMATION VIEW ── */}
      {view==="anim" && (
        <SceneAnimation
          key={animKey}
          problem={p}
          speed={speed}
          onDone={goCalc}
          onReplay={replayAnim}
        />
      )}

      {/* ── CALCULATION VIEW ── */}
      {view==="calc" && (
        <div>
          <div style={{
            background:"white",borderRadius:14,padding:"10px 12px",
            marginBottom:12,boxShadow:"0 2px 10px rgba(0,0,0,0.08)"
          }}>
            <ItemGrid p={p}/>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:"1em",fontWeight:"bold",color:"#666",paddingLeft:2}}>
              📝 順番に計算してみよう！
            </div>
            {steps.map((step,i)=>(
              <StepRow
                key={`${problemKey}-${i}`}
                rk={`${problemKey}-${i}`}
                step={step}
                status={i<doneCount?"done":i===doneCount?"active":"locked"}
                onCorrect={()=>setDoneCount(d=>d+1)}
              />
            ))}
            {solved && (
              <ResultCard
                c={c} p={p}
                onReset={goReset}
                onNext={goNext}
                isLast={isLast}
              />
            )}
          </div>
        </div>
      )}

      <style>{`
        @keyframes popIn {
          0%   { opacity:0; transform:scale(0.9); }
          100% { opacity:1; transform:scale(1); }
        }
        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
        input[type=number] { -moz-appearance:textfield; }
        button:active { transform:scale(0.97); }
      `}</style>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<SonekiGame />);
  </script>
</body>
</html>
